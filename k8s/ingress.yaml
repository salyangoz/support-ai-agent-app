apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
spec:
  ingressClassName: traefik
  rules:
    - host: support.yengec.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: support-ai-app
                port:
                  number: 80
