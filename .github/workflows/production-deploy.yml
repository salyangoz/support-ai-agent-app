name: Production Docker Image Deploy
on:
  push:
    branches:
      - master

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .
          retention-days: 1
          include-hidden-files: true

  build-image:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=https://support-api.yengec.co
          tags: salyangoz/support-ai-agent-app:latest
          cache-from: type=registry,ref=salyangoz/support-ai-agent-app:buildcache
          cache-to: type=registry,ref=salyangoz/support-ai-agent-app:buildcache,mode=max

  deploy:
    needs:
      - build-image
    runs-on: app-runner
    steps:
      - name: Sync Docker Hub pull secret
        run: |
          kubectl create secret docker-registry dockerhub-pull-secret \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username='${{ secrets.DOCKER_USERNAME }}' \
            --docker-password='${{ secrets.DOCKER_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Rollout app
        run: kubectl rollout restart deployment/support-ai-app
