apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-ai-app
  namespace: support-ai
  labels:
    app: support-ai-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: support-ai-app
  template:
    metadata:
      labels:
        app: support-ai-app
    spec:
      containers:
        - name: support-ai-app
          image: ghcr.io/salyangoz/support-agent-ai-app:latest
          ports:
            - containerPort: 80
          env:
            - name: API_UPSTREAM
              value: "http://support-ai-agent:3001"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
