apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-ai-app
  labels:
    app: support-ai-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: support-ai-app
  template:
    metadata:
      labels:
        app: support-ai-app
    spec:
      imagePullSecrets:
        - name: dockerhub-pull-secret
      containers:
        - name: support-ai-app
          image: salyangoz/support-ai-agent-app:latest
          ports:
            - containerPort: 80
          env:
            - name: API_UPSTREAM
              value: "http://support-ai-agent:3001"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: support-ai-app
spec:
  type: ClusterIP
  selector:
    app: support-ai-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
spec:
  ingressClassName: traefik
  rules:
    - host: support.yengec.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: support-ai-app
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: support-ai-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: support-ai-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
